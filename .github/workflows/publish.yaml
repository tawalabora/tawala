name: Publish Package

on:
  push:
    tags:
      - "release-*" # Triggered by: python publish.py --pypi
  workflow_dispatch: # Manual trigger
    inputs:
      target:
        description: "Publish target"
        required: true
        default: "pypi"
        type: choice
        options:
          - pypi

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        # Condition:
        # 1. Pushed a tag starting with 'release-' OR
        # 2. Manually triggered via workflow_dispatch with target 'pypi'
        if: |
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/release-')) ||
          (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

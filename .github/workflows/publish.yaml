name: Publish Package

on:
  push:
    tags:
      - "release-*" # PyPI: release-0.1.3, release-1.0.0
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: "pypi"
        type: choice
        options:
          - pypi

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        if: |
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/release-')) ||
          (github.event_name == 'release' && startsWith(github.ref, 'refs/tags/release-')) ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi')
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

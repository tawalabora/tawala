[build-system]
requires = ["uv_build>=0.9.10,<0.10.0"]
build-backend = "uv_build"

[[tool.uv.index]]
name = "testpypi"
url = "https://test.pypi.org/simple/"
publish-url = "https://test.pypi.org/legacy/"
explicit = true

[project]
name = "DjangX"
version = "0.1.0.dev1"
description = "Utilities for Django"
readme = "README.md"
license = { file = "LICENSE" }
authors = [
    { name = "christianwhocodes", email = "hey@christianwhocodes.space" },
]
requires-python = ">=3.12"
dependencies = ["django>=5.2.8", "pyperclip>=1.11.0"]

[project.scripts]
djangx = "djangx.cli.manage:main"

[project.urls]
Homepage = "https://github.com/christianwhocodes/djangx"
Repository = "https://github.com/christianwhocodes/djangx"
Issues = "https://github.com/christianwhocodes/djangx/issues"

[dependency-groups]
dev = ["djlint>=1.36.4", "psycopg[binary,pool]>=3.2.12", "python-decouple>=3.8"]

[tool.djlint]
ignore = "H016"
blank_line_after_tag = "load,extends"

[project]
name = "tawala"
version = "0.2.15"
description = "Add your description here"
readme = "README.md"
license = { file = "LICENSE" }
authors = [{ name = "christianwhocodes", email = "kevin@tawalabora.space" }]
requires-python = ">=3.12"
dependencies = [
    "django>=5.2.8",
    "pyperclip>=1.11.0",
    "rich>=14.2.0",
]

[dependency-groups]
dev = [
    "djlint>=1.36.4",
    "psycopg[binary,pool]>=3.2.12",
    "python-decouple>=3.8",
]

[project.urls]
Homepage = "https://github.com/christianwhocodes/tawala"
Repository = "https://github.com/christianwhocodes/tawala"
Issues = "https://github.com/christianwhocodes/tawala/issues"

[project.scripts]
tawala = "tawala.cli.manage:main"

[build-system]
requires = ["uv_build>=0.9.7,<0.10.0"]
build-backend = "uv_build"

[tool.djlint]
ignore = "H016"
blank_line_after_tag = "load,extends"
